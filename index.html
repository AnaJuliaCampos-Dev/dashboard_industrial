<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Industrial SCADA - Indústria 4.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scada-container">
        
        <section id="login-section">
            <h1>SCADA System</h1>
            <h2>Painel de Controle Industrial</h2>
            
            <div class="input-group">
                <input type="text" id="operador-nome" placeholder="Nome do Operador" autocomplete="off">
            </div>
            <button id="btn-entrar" onclick="validarAcesso()">Entrar</button>
            <p id="mensagem-erro" class="erro-texto"></p>

            <button id="btn-emergencia" class="hidden" onclick="dispararParadaEmergencia()">Botão de Emergência</button>
        </section>

        <main id="painel-principal" class="hidden">
            <div class="grid-layout">
                <section class="card">
                    <h2>Monitoramento</h2>
                    <div>
                        <label for="select-maquinas">Selecione a Máquina Ativa:</label>
                        <select id="select-maquinas" onchange="atualizarStatusMaquina()">
                            </select>
                    </div>
                    <div id="status-container">
                        <p><span id="status-texto">Aguardando seleção de máquina...</span></p>
                    </div>
                </section>

                <section class="card">
                    <h2>Sensor Térmico</h2>
                    <div id="sensor-visor">
                        <span id="temperatura-valor">0</span>°C
                    </div>
                    <p id="sensor-status">Aguardando leitura de barramento...</p>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
